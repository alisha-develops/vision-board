<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Playfair+Display&family=Poppins&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>vision board</title>
</head>
<body>
    <header>
        <h1 id="title"> my vision board!</h1>
    </header>
    <main>
        <audio id="player"></audio>
        <div id="music">♪</div>
        <div id="musicwindow">
            <button id="closemusic">✕</button>
            <h3>songs</h3>
            <div id="songlist"></div>
            <div id="nowplaying">
                <p id="trackname">no song playing</p>
                <button id="play">▶play</button>
            </div>
        </div>

        <div class="options">
                <img src="cards/Group 1138.png" class="img1" id="card1">
                <img src="cards/Group 1139.png" class="img1" id="card2">
        </div>
        <div id="backdrop"></div>
        <div id="templateswindow">
            <button id="closetemplates">✕</button>
            <p style="font-size:xx-large;">templates coming soon!(will ship it as an update :bleh:)</p>
            <div class="templates" style="font-size:large;">
                see custom for now!
            </div>
        </div>
        <div id="customwindow" style="width: 1200px; height: 600px;">
            <button id="closecustom">✕</button>
            <div id="closeconfirm">
                <p>are u sure? think again!</p>
                <div class="confirmbuttons">
                    <button id="confirmclose">yes</button>
                    <button id="cancelclose">no</button>
                </div>
            </div>
            <div class="toolbar">
                <button id="new" class="tools">new board</button>
                <div id="drawmenu" class="dropdown">
                    <button id="draw" class="tools">draw ↓</button>
                    <div id="drawoptions" class="dropdowncontent">
                        <button class="drawtool" data-tool="pencil">pencil</button>
                        <button class="drawtool" data-tool="marker">marker</button>
                        <button class="drawtool" data-tool="highlighter">highlighter</button>
                        <button class="drawtool" data-tool="eraser">eraser</button>
                    </div>
                </div>
                <button id="upload" class="tools">add photo</button>
                <input type="file" id="photoupload" accept="image/*" style="display:none;">
                <button id="text" class="tools">add text</button>
                <button id="shape" class="tools">shape</button>
                <button id="bgcolor" class="tools">background styles</button>
                <button id="empty" class="tools">clear</button>
                <button id="export" class="features">export canvas</button>
            </div>

            <div id="bgwindow">
                <button id="closebgwindow">✕</button>
                <h3>background studio</h3>
                <div class="textgroup">
                    <label>background color</label>
                    <input type="color" id="bgpicker">
                    <input id="bghexinput" placeholder="#f7ead7">
                </div>
                <div class="textgroup">
                    <label>show grid</label>
                    <input type="checkbox" id="gridtoggle">
                </div>

                <div class="textgroup">
                    <label>border color</label>
                    <input type="color" id="borderpicker">
                    <input id="borderhexinput" placeholder="#664b2c">
                </div>

                <div class="textgroup">
                    <label>border style</label>
                    <select id="borderstyle">
                        <option value="dashed">dashed (default)</option>
                        <option value="solid">solid</option>
                        <option value="dotted">dotted</option>
                        <option value="double">double</option>
                        <option value="none">none</option>
                    </select>
                </div>
            </div>

            <div id="board"></div>

            <button id="generatepalette">generate palette</button>
            <div id="palettewindow">
                <h3 id="palettetitle"></h3>
                <p id="copystatus"></p>
                <div id="palettecolors"></div>
                <button id="regenerate">regenerate</button>
                <a href="https://vision-board-mu.vercel.app/api/palette" target="_blank" id="apilink">brewed by my own api!</a>
            </div>
            <button id="textsettings" style="display:none;">text settings</button>
            <div id="textwindow">
                <button id="closetextwindow">✕</button>
                <h3>text studio</h3>
                <div class="textgroup">
                    <label>text color</label>
                    <input type="color" id="textcolor">
                    <input
                        id="hexinput"
                        placeholder="#664b2c">
                </div>
                <div class="textgroup">
                    <label>font size</label>
                    <input
                        type="range"
                        id="fontsize"
                        min="10"
                        max="120"
                        value="32">
                </div>
                <div class="textgroup">
                    <label>font</label>
                    <select id="fontfamily">
                        <option class="fontvalue" value="'Yuyu'">yuyu (default)</option>
                        <option class="fontvalue" value="'Caveat', cursive">caveat</option>
                        <option class="fontvalue" value="'Playfair Display', serif">playfair display</option>
                        <option class="fontvalue" value="'Poppins', sans-serif">poppins</option>
                        <option class="fontvalue" value="'Special Elite', monospace">special elite</option>
                    </select>
                </div>
                <div class="textgroup">
                    <label style="font-size: 1rem; text-decoration: dashed;">paste google font embed code</label>
                    <input id="fontembedinput" placeholder="<link href=... rel=stylesheet>">
                    <button id="fontembedapply">add font</button>
                </div>
                <div class="textbuttons">
                    <button id="bold"><b>B</b></button>
                    <button id="italic"><i>I</i></button>
                </div>
            </div>
        </div>
        <!-- <img src="cards/Group 1140 (1).png" id="arrow1">
        <img src="cards/Group 1141.png" id="arrow2"> -->
    </main>
    <footer>
        <div class="footer1">
            <p id="pg1">keys: <span class="icons">t</span> for templates and <span class="icons">c</span> for custom</p>
        </div>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="custom.js"></script>
</body>
</html>
