<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>vision board</title>
</head>
<body>
    <header>
        <h1> my vision board!</h1>
    </header>
    <main>
        <audio id="player"></audio>
        <button id="play"></button>
        <div class="options">
                <img src="/cards/Group 1138.png" class="img1" id="card1">
                <img src="/cards/Group 1139.png" class="img1" id="card2">
        </div>
        <div id="backdrop"></div>
        <div id="templateswindow">
            <button id="closetemplates">✕</button>
            <p>templates coming soon!</p>
            <div class="templates">
                soon!
            </div>
        </div>
        <div id="customwindow" style="width: 1200px; height: 600px;">
            <button id="closecustom">✕</button>
            <p>custom coming soon!</p>
            <div class="toolbar">
                <button id="new" class="tools">new board</button>
                <button id="draw" class="tools">pencil</button>
                <button id="upload" class="tools">add photo</button>
                <input type="file" id="photoupload" accept="image/*" style="display:none;">
                <button id="text" class="tools">add text</button>
                <button id="shape" class="tools">shape</button>
                <button id="bgcolor" class="tools">background color</button>
                <button id="empty" class="tools">clear</button>
                <button id="export" class="features">export canvas</button>
            </div>
        </div>
        <img src="/cards/Group 1140 (1).png" id="arrow1">
        <img src="/cards/Group 1141.png" id="arrow2">
    </main>
    <footer>
        <div class="footer1">
            <p id="pg1">keys: <span class="icons">t</span> for templates and <span class="icons">c</span> for custom</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
